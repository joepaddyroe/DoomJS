<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DoomJS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      overflow: auto;
      background: #111;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100%;
    }

    canvas {
      display: block;
      /* Native 320×200 at 2× integer scale → 640×400 (crisp pixels, no stretch) */
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      cursor: crosshair;
      outline: none;
    }
  </style>
</head>
<body>
  <canvas id="screen"></canvas>
  <script type="module" src="src/main.js?v=sound1"></script>
</body>
</html>
